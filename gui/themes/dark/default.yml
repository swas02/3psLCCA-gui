# gui/themes/dark/default.yml — Default dark theme.
name: Default Dark

palette:
  accent:           "#6B7D20"
  window:           "#282828"
  alternate_base:   "#333333"
  base:             "#3a3a3a"
  button:           "#3a3a3a"
  mid:              "#505050"
  midlight:         "#484848"
  light:            "#555555"
  highlight:        "#6B7D20"
  highlighted_text: "#ffffff"
  text:             "#e2e2e2"
  window_text:      "#e2e2e2"
  button_text:      "#e2e2e2"
  placeholder_text: "#888888"

qss_tokens:
  # ── Core (longest prefix first) ─────────────────────────────────────────
  "$primary-hover":      "#7c9811"
  "$primary-active":     "#6c830e"
  "$border-subtle":      "#5a5a5a"
  "$surface-active":     "#525252"
  "$body-color":         "#e2e2e2"
  "$secondary":          "#a0a0a0"
  "$primary":            "#90af13"
  "$body-bg":            "#282828"
  "$border":             "#505050"
  "$surface":            "#4a4a4a"
  "$muted":              "#686868"
  "$white":              "#3a3a3a"
  "$card-bg":            "#3a3a3a"

  # ── Semantic status ────────────────────────────────────────────────────
  "$validation-error":   "#f87171"
  "$danger":             "#f87171"
  "$danger-bg":          "rgba(248,113,113,0.10)"
  "$danger-bg-pressed":  "rgba(248,113,113,0.20)"
  "$placeholder":        "#888888"
  "$placeholder-text":   "#a0a0a0"

  "$success":            "#4ade80"
  "$warning":            "#fb923c"
  "$info":               "#60a5fa"

  # ── Sidebar chrome ─────────────────────────────────────────────────────
  "$sidebar-hover":      "#2e3424"
  "$sidebar-sel":        "#3a4a25"

  # ── Splash screen (gui/main.py) ─────────────────────────────────────────
  "$splash-progress":    "#2ecc71"
  "$splash-bg":          "#1a1a2e"

  # ── Brand icon (gui/project_window.py window icon) ───────────────────────
  "$icon-brand":         "#2ecc71"

  # ── Log viewer (gui/components/logs.py) ─────────────────────────────────
  "$log-success":        "#b5cea8"
  "$log-default":        "#d4d4d4"
  "$log-warning":        "#dcdcaa"
  "$log-error":          "#f48771"
  "$log-info":           "#4ec9b0"

  # ── Action icons ─────────────────────────────────────────────────────────
  "$icon-success":       "#2ecc71"
  "$icon-danger":        "#e74c3c"
  "$icon-muted":         "#888888"

  # ── Table cell validation states ─────────────────────────────────────────
  "$cell-warn-row-bg":   "#2a1515"
  "$cell-disabled-bg":   "#3a3a3a"
  "$cell-invalid-bg":    "#4a1f22"
  "$cell-warn-bg":       "#3d3000"
  "$cell-warn-fg":       "#ff4d4f"

  # ── Integrity states ────────────────────────────────────────────────────
  "$integrity-mismatch": "#f44336"
  "$integrity-missing":  "#ff9800"
  "$integrity-ok":       "#4caf50"

  # ── LCC Plot chart bands ─────────────────────────────────────────────────
  "$chart-initial-tick": "#6699cc"
  "$chart-initial-bg":   "#1e2a38"
  "$chart-use-tick":     "#44aa99"
  "$chart-use-bg":       "#1a2e28"
  "$chart-recon-tick":   "#9966cc"
  "$chart-recon-bg":     "#2a1c35"
  "$chart-eol-tick":     "#cc6666"
  "$chart-eol-bg":       "#2e1a1a"
  "$chart-bar-positive": "#c94040"
  "$chart-bar-negative": "#4caf50"