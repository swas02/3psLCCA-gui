name: Dracula

# Dracula palette reference: https://draculatheme.com/contribute
#   Background  #282a36   Current Line  #44475a   Foreground  #f8f8f2
#   Comment     #6272a4   Cyan          #8be9fd   Green       #50fa7b
#   Orange      #ffb86c   Pink          #ff79c6   Purple      #bd93f9
#   Red         #ff5555   Yellow        #f1fa8c

palette:
  primary:         "#bd93f9"   # Dracula Purple - theme accent
  brand:           "#90af13"   # app signature green

  window:          "#282a36"   # Background
  base:            "#21222c"   # elevated surface (inputs, cards)
  surface:         "#383a4a"   # hover bg (between Background and Current Line)
  surface_mid:     "#44475a"   # Current Line - border / divider
  surface_pressed: "#565869"   # pressed bg

  text:            "#f8f8f2"   # Foreground
  text_secondary:  "#ced4ed"   # very bright lavender gray (was #94a1d3)
  text_disabled:   "#94a1d3"   # brightened from #4d5068 to previous secondary level

  success:         "#50fa7b"   # Dracula Green
  warning:         "#ffb86c"   # Dracula Orange
  danger:          "#ff5555"   # Dracula Red
  info:            "#8be9fd"   # Dracula Cyan

state:
  hover:    0.50
  pressed:  0.12
  focus:    0.18
  disabled: 0.38
