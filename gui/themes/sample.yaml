# ═══════════════════════════════════════════════════════════════════════════════
# gui/themes/sample.yaml - Fully annotated theme template.
#
# HOW TO USE
# ──────────
# 1. Copy this file into  gui/themes/light/  or  gui/themes/dark/
# 2. Rename it to something unique (e.g. my_theme.yml)
# 3. Customise the hex values below.
# ═══════════════════════════════════════════════════════════════════════════════

name: My Custom Theme

# ─────────────────────────────────────────────────────────────────────────────
# 1. BASE PALETTE (Mandatory)
# ─────────────────────────────────────────────────────────────────────────────
# These are the foundation of the theme. Every key below MUST be present.
# The system automatically builds the QPalette and state-derived tints from these.

palette:
  # Brand identity
  primary:         "#90af13"   # brand green - main action color
  brand:           "#90af13"   # used for logos and marks

  # Neutrals (Surfaces)
  window:          "#f8f9fa"   # app-wide background (sidebar, panels)
  base:            "#ffffff"   # elevated surface (inputs, cards, table cells)
  surface:         "#e9ecef"   # neutral hover background
  surface_mid:     "#dee2e6"   # standard border / divider color
  surface_pressed: "#ced4da"   # neutral pressed / active background

  # Typography
  text:            "#212529"   # primary text color
  text_secondary:  "#6c757d"   # section headers, helper text
  text_disabled:   "#adb5bd"   # disabled text, placeholders

  # Semantic status
  success:         "#2ecc71"   # valid states, success messages
  warning:         "#f39c12"   # warnings, unusual values
  danger:          "#e74c3c"   # error states, destructive actions
  info:            "#3498db"   # informative highlights

# ─────────────────────────────────────────────────────────────────────────────
# 2. UI STATE MULTIPLIERS (Optional)
# ─────────────────────────────────────────────────────────────────────────────
# These control the opacity (0.0 to 1.0) of tints applied during interactions.
# If omitted, the system defaults below are used.

state:
  hover:    0.06   # subtle tint on mouse over
  pressed:  0.12   # deeper tint on click
  focus:    0.18   # halo / focus ring opacity
  disabled: 0.38   # faded look for inactive elements

# ─────────────────────────────────────────────────────────────────────────────
# 3. DERIVED TOKENS REFERENCE
# ─────────────────────────────────────────────────────────────────────────────
# You do NOT need to define these in your YAML. They are computed automatically
# and available in QSS as $token-name or in Python via get_token("token-name").
#
# Semantic aliases (for cleaner code):
#   $window          → maps to palette.window
#   $text            → maps to palette.text
#   $text_secondary  → maps to palette.text_secondary
#   $base            → maps to palette.base
#
# Text contrast:
#   $text-on-primary → automatically picks #ffffff or #000000 based on primary luminance
#
# State-derived alphas:
#   $primary-hover   → $primary @ 6% alpha
#   $primary-active  → $primary @ 12% alpha
#   $danger-bg       → $danger  @ 6% alpha
#   $sidebar-hover   → $primary @ 6% alpha
#   $sidebar-sel     → $primary @ 12% alpha
#
# Table cell states:
#   $cell-editable-bg → $primary @ 6% alpha (column highlight)
#   $cell-invalid-bg  → $danger  @ 12% alpha
#   $cell-warn-bg     → $warning @ 12% alpha
#   $cell-disabled-bg → palette.surface
# ─────────────────────────────────────────────────────────────────────────────
