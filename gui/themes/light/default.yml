# gui/themes/light/default.yml — Default light theme (Bootstrap 5 tokens).
name: Default Light

palette:
  accent:           "#0d6efd"
  window:           "#f8f9fa"   # BODY_BG
  alternate_base:   "#ffffff"   # WHITE
  base:             "#ffffff"
  button:           "#ffffff"
  mid:              "#e9ecef"   # BORDER_SUBTLE
  light:            "#dee2e6"   # BORDER
  highlight:        "#0d6efd"   # PRIMARY
  highlighted_text: "#000000"
  text:             "#212529"   # BODY_COLOR
  window_text:      "#212529"
  button_text:      "#212529"
  placeholder_text: "#6c757d"   # SECONDARY

qss_tokens:
  # ── Core (longest prefix first) ─────────────────────────────────────────
  "$primary-hover":      "#0b5ed7"
  "$primary-active":     "#0a58ca"
  "$border-subtle":      "#e9ecef"
  "$surface-active":     "#e2e6ea"
  "$body-color":         "#212529"
  "$secondary":          "#6c757d"
  "$primary":            "#0d6efd"
  "$body-bg":            "#f8f9fa"
  "$border":             "#dee2e6"
  "$surface":            "#e9ecef"
  "$muted":              "#6c757d"
  "$white":              "#ffffff"
  # ── Semantic status ────────────────────────────────────────────────────
  "$validation-error":   "#dc3545"   # QComboBox validation selector in main.qss
  "$danger":             "#ef4444"   # danger buttons / error states
  "$danger-bg":          "rgba(239,68,68,0.08)"
  "$danger-bg-pressed":  "rgba(239,68,68,0.18)"
  "$success":            "#22c55e"   # success / pass / include
  "$warning":            "#f97316"   # corrupted / warning
  "$info":               "#3b82f6"   # locked / informational
  "$placeholder":        "#6c757d"
  "$placeholder-text":   "#888888"   # empty-state / placeholder text
  "$card-bg":            "#ffffff"   # card / list-item background
  # ── Sidebar chrome ──────────────────────────────────────────────────────
  "$sidebar-hover":      "#e8edff"   # sidebar item hover
  "$sidebar-sel":        "#d0d9ff"   # sidebar item selected
  # ── Splash screen (gui/main.py) ─────────────────────────────────────────
  "$splash-progress":    "#2ecc71"   # splash message colour
  "$splash-bg":          "#1a1a2e"   # splash pixmap fill
  # ── Brand icon (gui/project_window.py window icon) ───────────────────────
  "$icon-brand":         "#2ecc71"
  # ── Log viewer (gui/components/logs.py) ─────────────────────────────────
  "$log-success":        "#b5cea8"   # green  — attached / SUCCESS lines
  "$log-default":        "#555555"   # default — info lines
  "$log-warning":        "#dcdcaa"   # yellow — WARN lines
  "$log-error":          "#f48771"   # red    — ERROR / CRITICAL lines
  "$log-info":           "#4ec9b0"   # teal   — Checkpoint / Restored lines
  # ── Action icons ─────────────────────────────────────────────────────────
  "$icon-success":       "#2ecc71"   # include buttons (recycling, carbon, structure)
  "$icon-danger":        "#e74c3c"   # trash / delete icons everywhere
  "$icon-muted":         "#aaaaaa"   # disabled / muted icon fallback (icons.py, transport_dialog)
  # ── Table cell validation states ─────────────────────────────────────────
  "$cell-warn-row-bg":   "#fff1f0"   # transport_emissions.py removed-vehicle row bg
  "$cell-disabled-bg":   "#e9ecef"   # material_emissions.py BG_DISABLED
  "$cell-invalid-bg":    "#f8d7da"   # material_emissions.py BG_INVALID / excel_importer ERROR_COLOR
  "$cell-warn-bg":       "#fff3cd"   # material_emissions.py BG_SUSPICIOUS / excel_importer WARN_COLOR
  "$cell-warn-fg":       "#cf1322"   # transport_emissions.py removed-vehicle text
  # ── Integrity states (gui/components/traffic_data/wpi_selector.py) ───────
  "$integrity-mismatch": "#b71c1c"   # hash mismatch
  "$integrity-missing":  "#e65100"   # no hash — unverified
  "$integrity-ok":       "#2e7d32"   # verified / OK
  # ── LCC Plot chart bands (gui/components/outputs/lcc_plot.py) ────────────
  "$chart-initial-tick": "#2c4a75"   # Initial Stage axis tick colour
  "$chart-initial-bg":   "#cfd9e8"   # Initial Stage band background
  "$chart-use-tick":     "#1f6f66"   # Use Stage axis tick colour
  "$chart-use-bg":       "#cfe8e2"   # Use Stage band background
  "$chart-recon-tick":   "#5a3270"   # Reconstruction Stage axis tick colour
  "$chart-recon-bg":     "#e8d5f0"   # Reconstruction Stage band background
  "$chart-eol-tick":     "#7a3b3b"   # End-of-Life Stage axis tick colour
  "$chart-eol-bg":       "#edd5d5"   # End-of-Life Stage band background
  "$chart-bar-positive": "#8b1a1a"   # positive cost bars (costs ≥ 0)
  "$chart-bar-negative": "#2e7d32"   # negative bars (savings) + results table green text
